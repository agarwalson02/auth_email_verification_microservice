services:

  postgres:
    image: postgres:17-alpine
    container_name: simple_auth_postgres
    ports:
      - "5433:5432"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - ./pgdata:/var/lib/postgresql/data
  redis:
    image: redis:8.2.0-alpine
    container_name: simple_auth_redis
    ports:
      - "6379:6379"
    restart: always